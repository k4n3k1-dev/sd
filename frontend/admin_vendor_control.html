<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Control – Campus Food</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav class="navbar">
  <span class="brand">🏪 Vendor Control</span>
  <div class="user-info" style="display: flex; gap: 1rem; align-items: center;">
    <span>👤 <span id="adminName"></span></span>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page">
  <div class="panel">
    <h2>Add Vendor Account</h2>
    <div class="form-row">
      <div class="form-group">
        <label for="newVendor">Username</label>
        <input id="newVendor" type="text" placeholder="e.g. vendor2">
      </div>
      <button class="btn btn-primary" onclick="createVendor()">+ Add Vendor</button>
    </div>
  </div>

  <h2>All Vendors</h2>
  <div class="panel" style="padding:0; overflow:hidden;">
    <table style="width:100%">
      <thead>
        <tr>
          <th>Username</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="vendorBody">
        <tr><td colspan="3" style="text-align:center;padding:1.5rem;color:var(--muted)">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div id="toast"></div>
<script src="script.js"></script>
<script>
  const username = sessionStorage.getItem('username') || 'Admin';
  document.getElementById('adminName').textContent = username;

  window.addEventListener('load', loadVendors);
</script>

</body>
</html>
