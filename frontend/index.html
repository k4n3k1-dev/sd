<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Food – Login</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">
    <div class="logo">🍔</div>
    <h2>Campus Food</h2>
    <p class="sub">Enter your username to continue</p>

    <div class="form-group">
      <label for="userInput">Username</label>
      <input id="userInput" type="text" placeholder="admin / vendor / student" autocomplete="off">
    </div>

    <button class="btn btn-primary btn-full" id="loginBtn">Login</button>
  </div>
</div>

<div id="toast"></div>
<script src="script.js"></script>

</body>
</html>
