<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Food – Login</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">
    <div class="logo">🍔</div>
    <h2>Campus Food</h2>
    <p class="sub">Login to continue</p>

    <div class="form-group">
      <label for="loginEmail">Email Address</label>
      <input id="loginEmail" type="email" placeholder="you@example.com" autocomplete="off">
    </div>

    <div class="form-group">
      <label for="loginPassword">Password</label>
      <input id="loginPassword" type="password" placeholder="••••••••">
    </div>

    <button class="btn btn-primary btn-full" id="loginBtn">Login</button>

    <p class="sub" style="margin-top: 1rem;">
      Don't have an account? 
      <a href="#" id="showSignupBtn" style="color: var(--teal);">Create an account</a>
    </p>
  </div>
</div>

<!-- Signup Modal -->
<div id="signupModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Create Account</h3>
      <span class="close">&times;</span>
    </div>
    
    <div class="form-group">
      <label for="signupUsername">Username</label>
      <input id="signupUsername" type="text" placeholder="e.g., john_doe">
    </div>

    <div class="form-group">
      <label for="signupEmail">Email Address</label>
      <input id="signupEmail" type="email" placeholder="you@example.com">
    </div>

    <div class="form-group">
      <label for="signupPassword">Password</label>
      <input id="signupPassword" type="password" placeholder="at least 6 characters">
    </div>

    <div class="form-group">
      <label for="signupRole">I am a...</label>
      <select id="signupRole">
        <option value="student">Student (Order Food)</option>
        <option value="vendor">Vendor (Sell Food)</option>
      </select>
    </div>

    <button class="btn btn-primary btn-full" id="signupBtn">Sign Up</button>
  </div>
</div>

<div id="toast"></div>
<script src="script.js"></script>
<script>
  // Modal elements
  const modal = document.getElementById("signupModal");
  const showSignupBtn = document.getElementById("showSignupBtn");
  const closeBtn = document.querySelector(".close");

  showSignupBtn?.addEventListener("click", (e) => {
    e.preventDefault();
    modal.style.display = "flex";
  });

  closeBtn?.addEventListener("click", () => {
    modal.style.display = "none";
  });

  window.addEventListener("click", (e) => {
    if (e.target === modal) {
      modal.style.display = "none";
    }
  });

  // Login handler
  document.getElementById("loginBtn")?.addEventListener("click", async () => {
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;

    if (!email || !password) {
      toast("Please enter email and password", "error");
      return;
    }

    try {
      const { data, error } = await sb.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (error) throw error;

      // Get user data from metadata
      let role = data.user.user_metadata?.role || 'student';
      
      // Override for admin email (backup in case metadata is missing)
      if (email === 'admin123@campusfood.com') {
        role = 'admin';
      }
      
      const username = data.user.user_metadata?.username || email.split('@')[0];

      sessionStorage.setItem("userId", data.user.id);
      sessionStorage.setItem("email", email);
      sessionStorage.setItem("username", username);
      sessionStorage.setItem("role", role);

      toast("Login successful!");

      const routes = {
        admin: "dashboard_admin.html",
        vendor: "dashboard_vendor.html",
        student: "dashboard_student.html",
      };
      window.location.href = routes[role] || "dashboard_student.html";

    } catch (err) {
      console.error('Login error:', err);
      toast(err.message || 'Login failed', 'error');
    }
  });

  // Signup handler
  document.getElementById("signupBtn")?.addEventListener("click", async () => {
    const username = document.getElementById("signupUsername").value.trim();
    const email = document.getElementById("signupEmail").value.trim();
    const password = document.getElementById("signupPassword").value;
    const role = document.getElementById("signupRole").value;

    if (!username || !email || !password) {
      toast("Please fill in all fields", "error");
      return;
    }

    if (password.length < 6) {
      toast("Password must be at least 6 characters", "error");
      return;
    }

    try {
      const { data, error } = await sb.auth.signUp({
        email: email,
        password: password,
        options: {
          data: {
            username: username,
            role: role
          }
        }
      });

      if (error) throw error;

      if (role === 'vendor') {
        const { error: insertError } = await sb
          .from('vendors')
          .insert([{
            id: data.user.id,
            username: username,
            status: 'pending'
          }]);

        if (insertError) throw insertError;
        toast("Vendor account created! Awaiting admin approval. You can now login.", "success");

      } else if (role === 'student') {
        const { error: insertError } = await sb
          .from('students')
          .insert([{
            id: data.user.id,
            username: username
          }]);

        if (insertError) throw insertError;
        toast("Student account created! You can now login.", "success");
      }

      // Clear form and close modal
      document.getElementById("signupUsername").value = "";
      document.getElementById("signupEmail").value = "";
      document.getElementById("signupPassword").value = "";
      modal.style.display = "none";

      // Auto-fill email in login form
      document.getElementById("loginEmail").value = email;
      
      toast("Account created! Please login with your email and password.", "success");

    } catch (err) {
      console.error('Signup error:', err);
      toast(err.message || 'Signup failed', 'error');
    }
  });
</script>

</body>
</html>
