<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Food – Login</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">
    <div class="logo">🍔</div>
    <h2>Campus Food</h2>
    <p class="sub">Enter your username to continue</p>

    <div class="form-group">
      <label for="userInput">Username</label>
      <input id="userInput" type="text" placeholder="admin123 / vendor / student" autocomplete="off">
    </div>

    <button class="btn btn-primary btn-full" id="loginBtn">Login</button>
  </div>
</div>

<div id="toast"></div>
<script src="script.js"></script>
<script>
  // Login handler for Supabase
  document.getElementById("loginBtn")?.addEventListener("click", async () => {
    const username = document.getElementById("userInput").value.toLowerCase().trim();
    if (!username) {
      toast("Enter your username", "error");
      return;
    }

    // Determine role
    let role = 'student';
    
    if (username === 'admin123') {
      role = 'admin';
    } else {
      const { data: vendor } = await sb
        .from('vendors')
        .select('*')
        .eq('username', username)
        .single();
      
      if (vendor) {
        role = 'vendor';
        if (vendor.status !== 'approved') {
          toast('Your account is pending admin approval', 'error');
          return;
        }
      }
    }
    
    const email = `${username}@campusfood.com`;
    const password = username;
    
    try {
      // For admin: ONLY sign in (don't create)
      if (role === 'admin') {
        const { data, error } = await sb.auth.signInWithPassword({
          email: email,
          password: password
        });
        
        if (error) {
          toast('Admin account not found. Please check Supabase.', 'error');
          console.error('Admin login error:', error);
          return;
        }
        
        sessionStorage.setItem("username", username);
        sessionStorage.setItem("role", role);
        
      } else {
        // For students/vendors: try sign in, then sign up
        let { data, error } = await sb.auth.signInWithPassword({
          email: email,
          password: password
        });
        
        if (error) {
          const { data: signUpData, error: signUpError } = await sb.auth.signUp({
            email: email,
            password: password,
            options: { data: { username, role } }
          });
          
          if (signUpError) throw signUpError;
          
          if (role === 'vendor') {
            await sb.from('vendors').insert([{ 
              id: signUpData.user.id, 
              username: username, 
              status: 'pending' 
            }]);
            toast('Vendor account created. Waiting for admin approval.', 'error');
            return;
          } else if (role === 'student') {
            await sb.from('students').insert([{ 
              id: signUpData.user.id, 
              username: username 
            }]);
          }
          
          sessionStorage.setItem("username", username);
          sessionStorage.setItem("role", role);
        } else {
          sessionStorage.setItem("username", username);
          sessionStorage.setItem("role", role);
        }
      }
      
      const routes = {
        admin:   "dashboard_admin.html",
        vendor:  "dashboard_vendor.html",
        student: "dashboard_student.html",
      };
      window.location.href = routes[role];
      
    } catch (err) {
      console.error('Login error:', err);
      toast(err.message || 'Login failed', 'error');
    }
  });
</script>

</body>
</html>
