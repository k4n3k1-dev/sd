<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incoming Orders – Campus Food</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav class="navbar">
  <span class="brand">📦 Incoming Orders</span>
  <div class="user-info" style="display: flex; gap: 1rem; align-items: center;">
    <span>👤 <span id="vendorName"></span></span>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page">
  <h2>Orders for <span id="vendorLabel"></span></h2>
  <div class="panel" style="padding:0; overflow:hidden;">
    <table style="width:100%">
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Student</th>
          <th>Items</th>
          <th>Total</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="ordersBody">
        <tr><td colspan="6" style="text-align:center;padding:1.5rem;color:var(--muted)">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div id="toast"></div>
<script src="script.js"></script>
<script>
  const username = sessionStorage.getItem('username') || 'Vendor';
  document.getElementById('vendorName').textContent = username;
  document.getElementById('vendorLabel').textContent = username;

  window.addEventListener('load', loadVendorOrders);
</script>

</body>
</html>
