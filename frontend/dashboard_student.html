<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard – Campus Food</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav class="navbar">
  <span class="brand">🍔 Campus Food — Student</span>
  <div class="user-info" style="display: flex; gap: 1rem; align-items: center;">
    <span>👤 <span id="studentName"></span></span>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page">
  <h2>Welcome, <span id="studentNameWelcome"></span></h2>

  <div class="cards">
    <a class="card" href="student_orders.html">
      <div class="icon">🛒</div>
      <div class="label">Browse &amp; Order</div>
    </a>
    <a class="card" href="student_history.html">
      <div class="icon">🕐</div>
      <div class="label">Order History</div>
    </a>
  </div>
</div>

<div id="toast"></div>
<script src="script.js"></script>
<script>
  const username = sessionStorage.getItem('username') || 'Student';
  document.getElementById('studentName').textContent = username;
  document.getElementById('studentNameWelcome').textContent = username;

  const role = sessionStorage.getItem('role');
  if (role !== 'student') {
    window.location.href = 'index.html';
  }
</script>

</body>
</html>
