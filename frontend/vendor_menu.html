<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Management – Campus Food</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav class="navbar">
  <span class="brand">🍽️ Menu Management</span>
  <div class="user-info" style="display: flex; gap: 1rem; align-items: center;">
    <span>👤 <span id="vendorName"></span></span>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page">
  <div class="panel">
    <h2>Add Menu Item</h2>
    <div class="form-row">
      <div class="form-group">
        <label for="itemName">Item Name</label>
        <input id="itemName" type="text" placeholder="e.g. Burger">
      </div>
      <div class="form-group">
        <label for="itemPrice">Price (R)</label>
        <input id="itemPrice" type="number" min="0" placeholder="e.g. 50">
      </div>
      <button class="btn btn-primary" onclick="addMenuItem()">+ Add Item</button>
    </div>
  </div>

  <h2>Your Current Menu</h2>
  <div id="vendorMenu" class="menu-grid">
    <p style="color:var(--muted)">Loading…</p>
  </div>
</div>

<div id="toast"></div>
<script src="script.js"></script>
<script>
  const username = sessionStorage.getItem('username') || 'Vendor';
  document.getElementById('vendorName').textContent = username;

  window.addEventListener('load', loadVendorMenu);
</script>

</body>
</html>
